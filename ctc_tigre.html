/* EL PARAGOLPE DIBUJADO (FLECHA ROJA + BARRA) */
.paragolpe-diseno {
    position: absolute;
    width: 25px;
    height: 20px;
    z-index: 100;
}

/* La flecha roja (Triángulo) */
.paragolpe-diseno::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 0;
    height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 15px solid #ff0000; /* Color rojo puro */
}

/* La barra vertical de tope */
.paragolpe-diseno::after {
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 20px;
    background-color: #ff0000;
}

/* La línea pequeña que une la flecha con la barra */
.paragolpe-diseno .union {
    position: absolute;
    left: 15px;
    top: 8px;
    width: 6px;
    height: 4px;
    background-color: #ff0000;
}

            ];

        parejasCambios.forEach(function(pareja) {
            var encontrado = false;
            var estadoActivo = false;
            
            // Verificamos si alguna de las claves de esta pareja viene en este envío de Firebase
            pareja.claves.forEach(function(clave) {
                if (datosEnclav[clave] !== undefined) {
                    encontrado = true;
                    if (datosEnclav[clave] === 1 || datosEnclav[clave] === "1") {
                        estadoActivo = true;
                    }
                }
            });

            // CRÍTICO: Solo modificamos el HTML si la cabina actual reportó datos sobre este enclavamiento

                pareja.ids.forEach(function(idHtml) {
                    var el = document.getElementById(idHtml) || document.getElementById(idHtml.toLowerCase()) || document.getElementById(idHtml.toUpperCase());
                    if (el) {

function sincronizarViasEspejo(dataVic) {
    if (!dataVic || !dataVic.vias) return;

    // Buscamos el estado real del circuito usando la clave que manda Firebase ("cv-vic")
    var estadoVia = dataVic.vias["cv-vic"];

    if (estadoVia !== undefined) {
        var elRecta = document.getElementById('cv-vic');
        var elDiagonal = document.getElementById('cvv-vic');
        var esLibre = (estadoVia === 0);

        if (elRecta) {
            elRecta.classList.toggle('libre', esLibre);
            elRecta.classList.toggle('ocupado', !esLibre);
        }
        if (elDiagonal) {
            elDiagonal.classList.toggle('libre', esLibre);
            elDiagonal.classList.toggle('ocupado', !esLibre);
        }
    }
}
